    // Let's set it as: only USA vs Paraguay result exists (United States won)

    const RESULTS = {

    // Predictions for md1_04 (USA vs Paraguay)

    const PREDICTIONS = {

      '8968834670_md1_04': 'United States',   // Germanjit ✓

    async function reset() {
      l('Step 1: Wiping all existing data...\n');
      await db.ref('players').remove();
      await db.ref('predictions').remove();
      await db.ref('results').remove();
      l('  Done.\n');

      l('Step 2: Creating players (phone-based keys)...\n');
      for (const [phone, data] of Object.entries(PLAYERS)) {
        await db.ref('players/' + phone).set({
          name: data.name,
          phone: data.phone,
          joined: '2026-06-12T00:00:00.000Z'
        });
        l(`  + ${data.name} → ${phone}`);
      }

      l('\nStep 3: Setting predictions...\n');
      for (const [key, val] of Object.entries(PREDICTIONS)) {
        await db.ref('predictions/' + key).set(val);
        l(`  ${key} = ${val}`);
      }

      l('\nStep 4: Setting results...\n');
      for (const [key, val] of Object.entries(RESULTS)) {
        await db.ref('results/' + key).set(val);
        l(`  ${key} = ${val}`);
      }

      l('\n✅ Reset complete!\n');
      l('Leaderboard should now show:');
      l('  Germanjit: 2 pts');
      l('  Pritesh: 2 pts');
      l('  Vidhi: 2 pts');
      l('  Everyone else: 0 pts');
    }

    reset().catch(e => l('ERROR: ' + e.message));
