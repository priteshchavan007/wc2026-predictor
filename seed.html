<!DOCTYPE html>
<html>
<head>
  <title>Sync Standings</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 24px; }
    pre { white-space: pre-wrap; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 6px; }
    button:hover { background: #0f0; color: #111; }
  </style>
</head>
<body>
  <h2>Sync Firebase to Current Standings</h2>
  <p>This will set predictions so the leaderboard matches the current WhatsApp-tracked standings.</p>
  <p>8 matches decided. From now on, the app auto-handles everything.</p>
  <button onclick="syncStandings()">Sync Now</button>
  <pre id="log"></pre>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDDuFB5d2R9gws79kX117mGHJvxZRIbwNk",
      authDomain: "wc2026-predictor-56ab2.firebaseapp.com",
      databaseURL: "https://wc2026-predictor-56ab2-default-rtdb.firebaseio.com",
      projectId: "wc2026-predictor-56ab2",
      storageBucket: "wc2026-predictor-56ab2.firebasestorage.app",
      messagingSenderId: "229291547598",
      appId: "1:229291547598:web:316de3c90a0bf8e9c5699f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const logEl = document.getElementById('log');
    function l(msg) { logEl.textContent += msg + '\n'; }

    // 8 finished matches with correct results
    const MATCH_RESULTS = {
      'md1_01': 'Mexico',         // Mexico vs South Africa -> Mexico won
      'md1_02': 'South Korea',    // S.Korea vs Czech Republic -> S.Korea won
      'md1_03': 'Draw',           // Canada vs Bosnia -> Draw
      'md1_04': 'United States',  // USA vs Paraguay -> USA won
      'md1_05': 'Draw',           // Qatar vs Switzerland -> Draw
      'md1_06': 'Draw',           // Brazil vs Morocco -> Draw
      'md1_07': 'Scotland',       // Haiti vs Scotland -> Scotland won (Haiti = home)
      'md1_08': 'Australia',      // Australia vs Turkey -> Australia won
    };

    const MATCH_IDS = Object.keys(MATCH_RESULTS);

    // Current standings - points each player should have
    // Points = correct predictions * 2
    const STANDINGS = {
      '8097296438': { name: 'Pritesh', points: 6 },       // 3 correct
      '9742596242': { name: 'Tanmay', points: 6 },        // 3 correct
      '8582609793': { name: 'Aditi', points: 4 },          // 2 correct
      '8968834670': { name: 'Germanjit', points: 4 },      // 2 correct
      '9834159538': { name: 'Pushkin Sonkusare', points: 4 },  // 2 correct
      '9916753799': { name: 'Shweta', points: 4 },         // 2 correct
      '9100787232': { name: 'Vidhi', points: 4 },           // 2 correct
      '8095707763': { name: 'Happy', points: 2 },           // 1 correct
      '7507057136': { name: 'Hemant', points: 2 },          // 1 correct
      '9591771293': { name: 'Priyanka', points: 2 },        // 1 correct
      '9703364440': { name: 'Sandeep', points: 2 },         // 1 correct
      '9553760842': { name: 'Anurag', points: 0 },          // 0 correct
      '8826032950': { name: 'Deepshika', points: 0 },       // 0 correct
      '9989601611': { name: 'Majji', points: 0 },           // 0 correct
      '9836657468': { name: 'Nirjhar', points: 0 },         // 0 correct
    };

    async function syncStandings() {
      l('=== Syncing Standings ===\n');

      const updates = {};

      // Clear existing predictions for default group
      updates['groups/default/predictions'] = null;

      l('Step 1: Setting match results...');
      Object.entries(MATCH_RESULTS).forEach(([id, winner]) => {
        updates['results/' + id] = winner;
        l(`  ${id}: ${winner}`);
      });

      l('\nStep 2: Creating predictions to match standings...');

      // For each player, create N correct predictions where N = points/2
      // Assign correct predictions to first N matches, wrong to the rest
      Object.entries(STANDINGS).forEach(([phone, data]) => {
        const correctNeeded = data.points / 2;
        l(`  ${data.name} (${phone}): ${correctNeeded} correct predictions needed`);

        MATCH_IDS.forEach((matchId, i) => {
          const key = phone + '_' + matchId;
          if (i < correctNeeded) {
            // Correct prediction
            updates['groups/default/predictions/' + key] = MATCH_RESULTS[matchId];
          } else {
            // Wrong prediction — pick something that's NOT the result
            const result = MATCH_RESULTS[matchId];
            let wrongPick;
            if (result === 'Draw') wrongPick = 'WrongTeam';
            else wrongPick = 'Draw';
            updates['groups/default/predictions/' + key] = wrongPick;
          }
        });
      });

      l('\nStep 3: Writing to Firebase...');
      try {
        await db.ref().update(updates);
        l('\n✅ Done! Leaderboard should now show:');
        const sorted = Object.entries(STANDINGS).sort((a,b) => b[1].points - a[1].points);
        sorted.forEach(([phone, data]) => {
          l(`  ${data.name}: ${data.points} pts`);
        });
        l('\nFrom now on, the app auto-calculates everything.');
      } catch(e) {
        l('ERROR: ' + e.message);
      }
    }
  </script>
</body>
</html>
