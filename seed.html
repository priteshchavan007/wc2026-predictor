<!DOCTYPE html>
<html>
<head>
  <title>Migrate to Phone Keys</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <h2>Migrating Firebase data to phone-based keys...</h2>
  <pre id="log"></pre>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDDuFB5d2R9gws79kX117mGHJvxZRIbwNk",
      authDomain: "wc2026-predictor-56ab2.firebaseapp.com",
      databaseURL: "https://wc2026-predictor-56ab2-default-rtdb.firebaseio.com",
      projectId: "wc2026-predictor-56ab2",
      storageBucket: "wc2026-predictor-56ab2.firebasestorage.app",
      messagingSenderId: "229291547598",
      appId: "1:229291547598:web:316de3c90a0bf8e9c5699f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const log = document.getElementById('log');
    function l(msg) { log.textContent += msg + '\n'; }

    const PLAYER_MAP = {
      'Pritesh': '8097296438',
      'Tanmay Jyot': '9742596242',
      'Hemant': '7507057136',
      'Vidhi': '9100787232',
      'Shweta': '9916753799',
      'Majji': '9989601611',
      'Sandeep': '9703364440',
      'Anurag': '9553760842',
      'Priyanka': '9591771293',
      'HS': '8095707763',
      'Germanjit': '8968834670',
    };

    const OLD_KEY_MAP = {
      'Pritesh': 'Pritesh',
      'Tanmay Jyot': 'Tanmay Jyot',
      'Hemant': 'Hemant',
      'Vidhi': 'Vidhi',
      'Shweta': 'Shweta',
      'Majji': 'Majji',
      'Sandeep': 'Sandeep',
      'Anurag': 'Anurag',
      'Priyanka': 'Priyanka',
      'HS': 'HS',
      'Germanjit': '89688',
    };

    async function migrate() {
      l('Step 1: Clearing old players and creating phone-based players...\n');

      await db.ref('players').remove();
      l('  Cleared old players.');

      for (const [name, phone] of Object.entries(PLAYER_MAP)) {
        await db.ref('players/' + phone).set({
          name: name,
          phone: phone,
          joined: '2026-06-12T00:00:00.000Z'
        });
        l(`  + ${name} → ${phone}`);
      }

      l('\nStep 2: Migrating predictions to phone-based keys...\n');

      const predSnap = await db.ref('predictions').once('value');
      const oldPreds = predSnap.val() || {};
      const updates = {};

      for (const key of Object.keys(oldPreds)) {
        updates[key] = null;
      }

      for (const [name, oldKey] of Object.entries(OLD_KEY_MAP)) {
        const phone = PLAYER_MAP[name];
        for (const key of Object.keys(oldPreds)) {
          if (key.startsWith(oldKey + '_')) {
            const matchPart = key.substring(oldKey.length + 1);
            updates[phone + '_' + matchPart] = oldPreds[key];
            l(`  ${name}: ${key} → ${phone}_${matchPart} = ${oldPreds[key]}`);
          }
        }
      }

      await db.ref('predictions').update(updates);

      l('\nStep 3: Verifying results...\n');
      const resSnap = await db.ref('results').once('value');
      const res = resSnap.val() || {};
      Object.entries(res).forEach(([k, v]) => l(`  ${k} = ${v}`));

      l('\n✅ Migration complete!');
      l('\nAll players now keyed by phone number.');
      l('Users log in with name + 10-digit mobile number.');
    }

    migrate().catch(e => l('ERROR: ' + e.message));
  </script>
</body>
</html>
