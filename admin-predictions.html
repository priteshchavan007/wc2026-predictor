<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Predictions</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #fff; padding: 12px; max-width: 540px; margin: 0 auto; }
h1 { font-size: 18px; margin-bottom: 12px; text-align: center; }
.player-selector { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; justify-content: center; }
.player-btn { padding: 7px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #aaa; font-size: 12px; cursor: pointer; font-weight: 600; }
.player-btn.active { background: #00b2a9; border-color: #00b2a9; color: #fff; }
.player-btn.done { border-color: #4caf50; color: #4caf50; }
.cards { display: flex; flex-direction: column; gap: 8px; padding-bottom: 70px; }
.card { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.06); }
.card.saved { border-color: #4caf50; }
.card.active-card { border-color: #4facfe; background: rgba(79,172,254,0.06); }
.card-date { font-size: 9px; color: #666; width: 38px; flex-shrink: 0; text-align: center; line-height: 1.2; }
.card-teams { display: flex; flex-direction: column; gap: 2px; width: 80px; flex-shrink: 0; }
.card-teams span { font-size: 11px; font-weight: 700; }
.card-teams span.home { color: #ccc; }
.card-teams span.away { color: #999; }
.card-scores { display: flex; flex-direction: column; gap: 2px; }
.card-scores input { width: 34px; padding: 5px 2px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; text-align: center; font-weight: 700; }
.card-scores input:focus { border-color: #4facfe; outline: none; background: rgba(79,172,254,0.15); }
.card-winner { display: flex; flex-direction: column; gap: 2px; margin-left: auto; }
.card-winner button { padding: 5px 10px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: #888; font-size: 10px; font-weight: 600; cursor: pointer; }
.card-winner button.sel { background: #00b2a9; border-color: #00b2a9; color: #fff; }
.card-check { width: 18px; font-size: 13px; flex-shrink: 0; text-align: center; }
.save-all { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: calc(100% - 24px); max-width: 516px; padding: 14px; border-radius: 10px; border: none; background: linear-gradient(135deg, #00b2a9, #4facfe); color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 20px rgba(0,178,169,0.4); z-index: 10; }
.save-all:active { transform: translateX(-50%) scale(0.98); }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #4caf50; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 13px; font-weight: 700; display: none; z-index: 99; }
.counter { text-align: center; font-size: 11px; color: #666; margin-bottom: 10px; }
.hint { text-align: center; font-size: 10px; color: #555; margin-bottom: 10px; }
</style>
</head>
<body>

<h1>Predictions Entry</h1>
<div class="player-selector" id="player-tabs"></div>
<div class="counter" id="counter"></div>
<div class="hint">Type score → winner auto-detected. Click team button to override draws. Enter/Tab advances.</div>
<div class="cards" id="cards"></div>
<button class="save-all" onclick="saveAll()">Save All & Next Player →</button>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
firebase.initializeApp({
  databaseURL: "https://wc2026-predictor-56ab2-default-rtdb.firebaseio.com"
});
const db = firebase.database();

const PLAYERS = [
  { id: '9100787232', name: 'Vidhi' },
  { id: '9916753799', name: 'Shweta' },
  { id: '8097296438', name: 'Pritesh' },
  { id: '8968834670', name: 'German.' },
  { id: '9836657468', name: 'Nirjhar' },
  { id: '9834159538', name: 'Pushkin' },
  { id: '7507057136', name: 'Hemant' },
  { id: '8095707763', name: 'HS' },
  { id: '9703364440', name: 'Sandeep' },
  { id: '8582609793', name: 'Aditi' },
  { id: '9553760642', name: 'Anurag' },
  { id: '9989601611', name: 'Majji' },
  { id: '8826032950', name: 'Deep.' },
];

const MATCHES = [
  { id: 'api_537417', home: 'South Africa', away: 'Canada', date: 'Jun 28', h: 'RSA', a: 'CAN' },
  { id: 'api_537423', home: 'Brazil', away: 'Japan', date: 'Jun 29', h: 'BRA', a: 'JPN' },
  { id: 'api_537415', home: 'Germany', away: 'Paraguay', date: 'Jun 29', h: 'GER', a: 'PAR' },
  { id: 'api_537418', home: 'Netherlands', away: 'Morocco', date: 'Jun 30', h: 'NED', a: 'MAR' },
  { id: 'api_537424', home: 'Ivory Coast', away: 'Norway', date: 'Jun 30', h: 'CIV', a: 'NOR' },
  { id: 'api_537416', home: 'France', away: 'Sweden', date: 'Jul 1', h: 'FRA', a: 'SWE' },
  { id: 'api_537425', home: 'Mexico', away: 'Ecuador', date: 'Jul 1', h: 'MEX', a: 'ECU' },
  { id: 'api_537426', home: 'England', away: 'Congo DR', date: 'Jul 1', h: 'ENG', a: 'COD' },
  { id: 'api_537422', home: 'Belgium', away: 'Senegal', date: 'Jul 2', h: 'BEL', a: 'SEN' },
  { id: 'api_537421', home: 'USA', away: 'Bosnia-H.', date: 'Jul 2', h: 'USA', a: 'BIH' },
  { id: 'api_537420', home: 'Spain', away: 'Austria', date: 'Jul 2', h: 'ESP', a: 'AUT' },
  { id: 'api_537419', home: 'Portugal', away: 'Croatia', date: 'Jul 3', h: 'POR', a: 'CRO' },
  { id: 'api_537429', home: 'Switzerland', away: 'Algeria', date: 'Jul 3', h: 'SUI', a: 'ALG' },
  { id: 'api_537428', home: 'Australia', away: 'Egypt', date: 'Jul 3', h: 'AUS', a: 'EGY' },
  { id: 'api_537427', home: 'Argentina', away: 'Cape Verde', date: 'Jul 3', h: 'ARG', a: 'CPV' },
  { id: 'api_537430', home: 'Colombia', away: 'Ghana', date: 'Jul 4', h: 'COL', a: 'GHA' },
];

let currentPlayer = 0;
let donePlayers = new Set();

function init() {
  renderPlayerTabs();
  loadPlayer(0);
}

function renderPlayerTabs() {
  document.getElementById('player-tabs').innerHTML = PLAYERS.map((p, i) =>
    `<div class="player-btn ${i === currentPlayer ? 'active' : ''} ${donePlayers.has(i) ? 'done' : ''}" onclick="loadPlayer(${i})">${p.name}</div>`
  ).join('');
}

function loadPlayer(idx) {
  currentPlayer = idx;
  const player = PLAYERS[idx];
  renderPlayerTabs();

  let html = '';
  MATCHES.forEach((m, mi) => {
    html += `<div class="card" id="card_${mi}">
      <div class="card-date">${m.date}</div>
      <div class="card-teams">
        <span class="home">${m.h}</span>
        <span class="away">${m.a}</span>
      </div>
      <div class="card-scores">
        <input type="number" id="sh_${mi}" min="0" max="9" inputmode="numeric"
          onfocus="this.select(); activateCard(${mi})"
          oninput="autoWinner(${mi}); advanceTo('sa_${mi}')"
          onkeydown="navKey(event, ${mi}, 'h')">
        <input type="number" id="sa_${mi}" min="0" max="9" inputmode="numeric"
          onfocus="this.select(); activateCard(${mi})"
          oninput="autoWinner(${mi}); advanceTo('sh_${mi + 1}')"
          onkeydown="navKey(event, ${mi}, 'a')">
      </div>
      <div class="card-winner">
        <button id="wh_${mi}" onclick="setWinner(${mi}, '${m.home}')">${m.h}</button>
        <button id="wa_${mi}" onclick="setWinner(${mi}, '${m.away}')">${m.a}</button>
      </div>
      <div class="card-check" id="ck_${mi}"></div>
    </div>`;
  });
  document.getElementById('cards').innerHTML = html;
  updateCounter();

  // Load existing
  MATCHES.forEach((m, mi) => {
    db.ref('groups/default/predictions/' + player.id + '_' + m.id).once('value', snap => {
      const v = snap.val();
      if (!v) return;
      if (v.home !== undefined) document.getElementById('sh_' + mi).value = v.home;
      if (v.away !== undefined) document.getElementById('sa_' + mi).value = v.away;
      if (v.winner) {
        document.getElementById('card_' + mi).dataset.winner = v.winner;
        showWinner(mi, v.winner);
      }
      document.getElementById('card_' + mi).classList.add('saved');
      document.getElementById('ck_' + mi).textContent = '✓';
    });
  });

  setTimeout(() => document.getElementById('sh_0').focus(), 100);
}

function autoWinner(mi) {
  const m = MATCHES[mi];
  const h = parseInt(document.getElementById('sh_' + mi).value);
  const a = parseInt(document.getElementById('sa_' + mi).value);
  const card = document.getElementById('card_' + mi);

  if (isNaN(h) || isNaN(a)) {
    card.dataset.winner = '';
    showWinner(mi, '');
    updateCounter();
    return;
  }

  let winner;
  if (h > a) winner = m.home;
  else if (a > h) winner = m.away;
  else winner = card.dataset.winner || '';

  card.dataset.winner = winner;
  showWinner(mi, winner);
  updateCounter();
}

function setWinner(mi, team) {
  document.getElementById('card_' + mi).dataset.winner = team;
  showWinner(mi, team);
  updateCounter();
}

function showWinner(mi, winner) {
  const m = MATCHES[mi];
  const hBtn = document.getElementById('wh_' + mi);
  const aBtn = document.getElementById('wa_' + mi);
  hBtn.classList.toggle('sel', winner === m.home);
  aBtn.classList.toggle('sel', winner === m.away);
}

function activateCard(mi) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active-card'));
  document.getElementById('card_' + mi).classList.add('active-card');
}

function advanceTo(nextId) {
  const el = document.getElementById(nextId);
  if (el) setTimeout(() => el.focus(), 50);
}

function navKey(e, mi, which) {
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    if (which === 'h') {
      document.getElementById('sa_' + mi).focus();
    } else if (mi < MATCHES.length - 1) {
      document.getElementById('sh_' + (mi + 1)).focus();
    } else {
      saveAll();
    }
  }
}

function saveAll() {
  const player = PLAYERS[currentPlayer];
  const updates = {};
  let count = 0;

  MATCHES.forEach((m, mi) => {
    const card = document.getElementById('card_' + mi);
    const winner = card.dataset.winner;
    const h = document.getElementById('sh_' + mi).value;
    const a = document.getElementById('sa_' + mi).value;
    if (!winner && h === '' && a === '') return;
    updates['groups/default/predictions/' + player.id + '_' + m.id] = {
      winner: winner || m.home,
      home: parseInt(h) || 0,
      away: parseInt(a) || 0
    };
    count++;
  });

  if (count === 0) { toast('Nothing to save'); return; }

  db.ref().update(updates).then(() => {
    toast(`Saved ${count} matches for ${player.name}!`);
    donePlayers.add(currentPlayer);
    renderPlayerTabs();
    if (currentPlayer < PLAYERS.length - 1) {
      setTimeout(() => loadPlayer(currentPlayer + 1), 600);
    }
  });
}

function updateCounter() {
  const filled = MATCHES.filter((m, mi) => document.getElementById('card_' + mi).dataset.winner).length;
  document.getElementById('counter').textContent = `${PLAYERS[currentPlayer].name}: ${filled}/${MATCHES.length} matches filled`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 1500);
}

init();
</script>
</body>
</html>
